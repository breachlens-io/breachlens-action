name: 'BreachLens Scan'
description: |
  Trigger a BreachLens scan, wait for completion, fetch SARIF results,
  and (optionally) gate the build on severity. Uploads SARIF to GitHub
  Code Scanning so findings appear in the Security tab.

# Phase A2 — composite Action wrapping the existing /api/scans + SARIF
# export endpoints. Stays curl-based on purpose: zero language runtime
# requirement on the runner (uses bash + jq which are pre-installed
# on every GitHub-hosted runner). The standalone TypeScript CLI is a
# Phase A4 polish layer for people who want a proper `breachlens` binary.

branding:
  icon:  shield
  color: blue

inputs:
  api-url:
    description: |
      Base URL of your BreachLens deployment (e.g. https://breachlens.example.com).
      The Action POSTs to {api-url}/api/repos/{repo-id}/scan and polls
      {api-url}/api/scans/{scan-id} for completion.
    required: true

  api-token:
    description: |
      A BreachLens API token (format: blt_<32 chars>). Phase A4 auth flow:
        1. Settings → API Tokens → Generate token
        2. Pick name + scopes (need scans:trigger, scans:read, findings:read
           for a full CI workflow)
        3. Copy the plaintext token (shown ONCE)
        4. Store as a GitHub secret: BREACHLENS_API_TOKEN
      The token authenticates as the user who minted it, scoped to that
      user's active org. Sent as `Authorization: Bearer blt_...`.
    required: false
    default: ''

  session-cookie:
    description: |
      DEPRECATED — use api-token instead. Pre-A4 auth flow via
      browser session cookie. Kept here for backwards compatibility
      with workflows pinned to v0.x of this Action; will be removed
      after one minor-version cycle. If both api-token and
      session-cookie are set, api-token wins.
    required: false
    default: ''

  repo-id:
    description: |
      Legacy explicit mode — the BreachLens Repository ID to scan.
      Find it in the URL when you open the repo on /repositories.
      Mutually exclusive with container-id and domain-id.

      OMIT THIS INPUT for the recommended auto-discovery mode (Phase A7):
      the Action reads the GITHUB_REPOSITORY env var from the runner
      and BreachLens auto-onboards the repo on first call. Auto-discovery
      requires the API token's owner to have stored GitHub OAuth
      credentials (any user who's logged into BreachLens via GitHub OAuth
      at least once has them).
    required: false
    default: ''

  container-id:
    description: 'BreachLens Container ID to scan. Mutually exclusive with repo-id and domain-id.'
    required: false
    default: ''

  domain-id:
    description: 'BreachLens Domain ID to scan. Mutually exclusive with repo-id and container-id.'
    required: false
    default: ''

  scan-types:
    description: |
      Comma-separated scan types to run. Defaults vary by target:
        repo      → SAST,SCA,SECRET,IAC,CONTAINER (full code-side sweep)
        container → CONTAINER
        domain    → DAST  (use PENTEST_FULL for the deeper sweep — slow)
    required: false
    default: ''

  severity-gate:
    description: |
      Fail the build if findings of this severity or higher are present.
      One of: CRITICAL, HIGH, MEDIUM, LOW, INFO, none.
      Default 'none' = report findings but never fail the build.
      Recommended for production: HIGH (allows MEDIUM noise without blocking).
    required: false
    default: 'none'

  upload-sarif:
    description: |
      Upload the SARIF result to GitHub Code Scanning so findings appear
      in the Security tab. Requires the workflow to have `security-events:
      write` permission. Default true.
    required: false
    default: 'true'

  poll-interval-seconds:
    description: 'How often to poll scan status while waiting for completion.'
    required: false
    default: '15'

  timeout-minutes:
    description: |
      Hard timeout — fail the build if the scan does not complete in this
      many minutes. PENTEST_FULL can take 30+ min; default 45 covers most
      scan types. Bump for very large repos.
    required: false
    default: '45'

outputs:
  scan-id:
    description: 'BreachLens scan job ID that was triggered.'
    value: ${{ steps.trigger.outputs.scan-id }}
  status:
    description: 'Final scan status (COMPLETED / FAILED).'
    value: ${{ steps.poll.outputs.status }}
  critical-count:
    description: 'Number of CRITICAL findings on the scan target.'
    value: ${{ steps.summarise.outputs.critical }}
  high-count:
    description: 'Number of HIGH findings on the scan target.'
    value: ${{ steps.summarise.outputs.high }}
  medium-count:
    description: 'Number of MEDIUM findings on the scan target.'
    value: ${{ steps.summarise.outputs.medium }}
  sarif-path:
    description: 'Local file path of the downloaded SARIF report.'
    value: ${{ steps.fetch-sarif.outputs.path }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        # Phase A7 — auto-discovery mode is the default when no
        # target ID is given. The action then uses GITHUB_REPOSITORY
        # to onboard the repo automatically. Operators with explicit
        # repo-id / container-id / domain-id still get the legacy mode.
        TARGETS_SET=0
        [[ -n "${{ inputs.repo-id }}"      ]] && TARGETS_SET=$((TARGETS_SET + 1))
        [[ -n "${{ inputs.container-id }}" ]] && TARGETS_SET=$((TARGETS_SET + 1))
        [[ -n "${{ inputs.domain-id }}"    ]] && TARGETS_SET=$((TARGETS_SET + 1))
        if [[ $TARGETS_SET -gt 1 ]]; then
          echo "::error::Set at most one of repo-id, container-id, or domain-id (or none for auto-discovery)."
          exit 1
        fi
        # Exactly one auth method must be set. api-token preferred; session-cookie deprecated.
        if [[ -z "${{ inputs.api-token }}" && -z "${{ inputs.session-cookie }}" ]]; then
          echo "::error::Must provide either api-token (preferred) or session-cookie (deprecated)."
          exit 1
        fi
        if [[ -n "${{ inputs.session-cookie }}" && -z "${{ inputs.api-token }}" ]]; then
          echo "::warning::Using deprecated session-cookie auth. Mint a proper API token under Settings → API Tokens for a forward-compatible workflow."
        fi
        # Severity gate must be one of the allowed values.
        case "${{ inputs.severity-gate }}" in
          CRITICAL|HIGH|MEDIUM|LOW|INFO|none) ;;
          *) echo "::error::Invalid severity-gate '${{ inputs.severity-gate }}' — must be CRITICAL/HIGH/MEDIUM/LOW/INFO/none."; exit 1 ;;
        esac
        echo "✓ Inputs valid."

    - name: Trigger scan
      id: trigger
      shell: bash
      env:
        API_URL:        ${{ inputs.api-url }}
        API_TOKEN:      ${{ inputs.api-token }}
        SESSION:        ${{ inputs.session-cookie }}
        REPO_ID:        ${{ inputs.repo-id }}
        CONTAINER_ID:   ${{ inputs.container-id }}
        DOMAIN_ID:      ${{ inputs.domain-id }}
        SCAN_TYPES:     ${{ inputs.scan-types }}
      run: |
        # Phase A7 — auto-discovery context. Composite actions can't use
        # the github expression context in step env blocks (parser rejects it),
        # so we read the runner's auto-injected env vars directly.
        # GITHUB_REPOSITORY / GITHUB_SHA / GITHUB_HEAD_REF / GITHUB_REF_NAME
        # are populated on every workflow step. PR number is in the event
        # payload at $GITHUB_EVENT_PATH.
        GH_REPOSITORY="${GITHUB_REPOSITORY:-}"
        GH_SHA="${GITHUB_SHA:-}"
        GH_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}"
        if [[ -f "${GITHUB_EVENT_PATH:-}" ]]; then
          GH_PR_NUMBER=$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")
        else
          GH_PR_NUMBER=""
        fi

        # Pick auth header based on which input is set. api-token wins.
        if [[ -n "$API_TOKEN" ]]; then
          AUTH_HEADER="Authorization: Bearer $API_TOKEN"
        else
          AUTH_HEADER="Cookie: connect.sid=$SESSION"
        fi

        # ── Endpoint + body selection ─────────────────────────────────
        # Three modes:
        #   1. Auto-discovery (no target ID set) — Phase A7 default.
        #      POSTs to /api/scans/from-github with GitHub context.
        #      BreachLens auto-onboards the repo on first call.
        #   2. Explicit target ID — legacy mode for operators who
        #      manually registered the resource in BreachLens UI.
        #   3. Container / Domain — same as before, no auto-discovery.
        if [[ -n "$REPO_ID" ]]; then
          ENDPOINT="$API_URL/api/repos/$REPO_ID/scan"
          if [[ -n "$SCAN_TYPES" ]]; then
            BODY=$(jq -nc --arg types "$SCAN_TYPES" '{ scanTypes: ($types | split(",")) }')
          else
            BODY='{}'
          fi
        elif [[ -n "$CONTAINER_ID" ]]; then
          ENDPOINT="$API_URL/api/containers/$CONTAINER_ID/scan"
          if [[ -n "$SCAN_TYPES" ]]; then
            BODY=$(jq -nc --arg types "$SCAN_TYPES" '{ scanTypes: ($types | split(",")) }')
          else
            BODY='{}'
          fi
        elif [[ -n "$DOMAIN_ID" ]]; then
          ENDPOINT="$API_URL/api/domains/$DOMAIN_ID/scan"
          if [[ -n "$SCAN_TYPES" ]]; then
            BODY=$(jq -nc --arg types "$SCAN_TYPES" '{ scanTypes: ($types | split(",")) }')
          else
            BODY='{}'
          fi
        else
          # Auto-discovery — the new default.
          if [[ -z "$GH_REPOSITORY" ]]; then
            echo "::error::Auto-discovery requires the workflow to be running in a GitHub repo context."
            exit 1
          fi
          ENDPOINT="$API_URL/api/scans/from-github"
          # Build the JSON body with optional fields that pass through
          # to BreachLens for triggerType + commit + PR linkage.
          BODY=$(jq -nc \
            --arg full      "$GH_REPOSITORY" \
            --arg sha       "$GH_SHA" \
            --arg branch    "$GH_REF" \
            --arg pr        "$GH_PR_NUMBER" \
            --arg types     "$SCAN_TYPES" \
            '{ githubFullName: $full }
             + (if $sha    != "" then { commitSha: $sha }              else {} end)
             + (if $branch != "" then { branch:    $branch }           else {} end)
             + (if $pr     != "" then { prNumber:  ($pr | tonumber) }  else {} end)
             + (if $types  != "" then { scanTypes: ($types | split(",")) } else {} end)')
        fi

        echo "POST $ENDPOINT"
        echo "Body: $BODY"
        RESPONSE=$(curl -fsS -X POST "$ENDPOINT" \
          -H "$AUTH_HEADER" \
          -H "Content-Type: application/json" \
          -d "$BODY")
        echo "$RESPONSE"

        SCAN_ID=$(echo "$RESPONSE" | jq -r '.id // .scanJobId // empty')
        if [[ -z "$SCAN_ID" ]]; then
          echo "::error::Failed to extract scan ID from response."
          exit 1
        fi
        echo "scan-id=$SCAN_ID" >> "$GITHUB_OUTPUT"

        # Surface auto-onboarding info when applicable
        REPO_NEW=$(echo "$RESPONSE" | jq -r '.repository.newlyCreated // empty')
        REPO_NAME=$(echo "$RESPONSE" | jq -r '.repository.fullName // empty')
        if [[ "$REPO_NEW" == "true" ]]; then
          echo "✓ Auto-onboarded repository $REPO_NAME"
        fi
        echo "✓ Triggered scan $SCAN_ID"

    - name: Poll for completion
      id: poll
      shell: bash
      env:
        API_URL:           ${{ inputs.api-url }}
        API_TOKEN:         ${{ inputs.api-token }}
        SESSION:           ${{ inputs.session-cookie }}
        SCAN_ID:           ${{ steps.trigger.outputs.scan-id }}
        POLL_INTERVAL:     ${{ inputs.poll-interval-seconds }}
        TIMEOUT_MIN:       ${{ inputs.timeout-minutes }}
      run: |
        if [[ -n "$API_TOKEN" ]]; then
          AUTH_HEADER="Authorization: Bearer $API_TOKEN"
        else
          AUTH_HEADER="Cookie: connect.sid=$SESSION"
        fi
        DEADLINE=$(( $(date +%s) + (TIMEOUT_MIN * 60) ))
        STATUS=PENDING
        while [[ "$STATUS" != "COMPLETED" && "$STATUS" != "FAILED" ]]; do
          if (( $(date +%s) > DEADLINE )); then
            echo "::error::Scan $SCAN_ID exceeded ${TIMEOUT_MIN}-minute timeout (last status: $STATUS)."
            exit 1
          fi
          sleep "$POLL_INTERVAL"
          STATUS=$(curl -fsS "$API_URL/api/scans/$SCAN_ID" \
            -H "$AUTH_HEADER" | jq -r '.status // "UNKNOWN"')
          echo "[poll] scan $SCAN_ID status: $STATUS"
        done
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        if [[ "$STATUS" == "FAILED" ]]; then
          echo "::error::Scan $SCAN_ID failed."
          exit 1
        fi
        echo "✓ Scan $SCAN_ID COMPLETED"

    - name: Fetch SARIF
      id: fetch-sarif
      shell: bash
      env:
        API_URL:    ${{ inputs.api-url }}
        API_TOKEN:  ${{ inputs.api-token }}
        SESSION:    ${{ inputs.session-cookie }}
        SCAN_ID:    ${{ steps.trigger.outputs.scan-id }}
      run: |
        if [[ -n "$API_TOKEN" ]]; then
          AUTH_HEADER="Authorization: Bearer $API_TOKEN"
        else
          AUTH_HEADER="Cookie: connect.sid=$SESSION"
        fi
        SARIF_PATH="breachlens-${SCAN_ID}.sarif"
        curl -fsS "$API_URL/api/scans/$SCAN_ID/export.sarif" \
          -H "$AUTH_HEADER" \
          -o "$SARIF_PATH"
        echo "path=$SARIF_PATH" >> "$GITHUB_OUTPUT"
        BYTES=$(wc -c < "$SARIF_PATH")
        echo "✓ Wrote $SARIF_PATH ($BYTES bytes)"

    - name: Summarise findings + apply severity gate
      id: summarise
      shell: bash
      env:
        SARIF_PATH:    ${{ steps.fetch-sarif.outputs.path }}
        SEVERITY_GATE: ${{ inputs.severity-gate }}
      run: |
        # The SARIF properties bag carries `severity` directly.
        # Count by severity buckets the BreachLens way.
        CRITICAL=$(jq '[.runs[].results[] | select(.properties.severity == "CRITICAL")] | length' "$SARIF_PATH")
        HIGH=$(jq     '[.runs[].results[] | select(.properties.severity == "HIGH")]     | length' "$SARIF_PATH")
        MEDIUM=$(jq   '[.runs[].results[] | select(.properties.severity == "MEDIUM")]   | length' "$SARIF_PATH")
        LOW=$(jq      '[.runs[].results[] | select(.properties.severity == "LOW")]      | length' "$SARIF_PATH")
        INFO=$(jq     '[.runs[].results[] | select(.properties.severity == "INFO")]     | length' "$SARIF_PATH")

        echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
        echo "high=$HIGH"         >> "$GITHUB_OUTPUT"
        echo "medium=$MEDIUM"     >> "$GITHUB_OUTPUT"

        # Step summary — surfaces in the GitHub Actions UI.
        cat >> "$GITHUB_STEP_SUMMARY" << EOF
        ## BreachLens scan results

        | Severity | Count |
        |---|---|
        | 🔴 Critical | $CRITICAL |
        | 🟠 High     | $HIGH     |
        | 🟡 Medium   | $MEDIUM   |
        | 🔵 Low      | $LOW      |
        | ⚪ Info     | $INFO     |

        **Severity gate:** \`$SEVERITY_GATE\`
        EOF

        # Severity gate — fail the build if findings >= the gate exist.
        # Order: CRITICAL > HIGH > MEDIUM > LOW > INFO > none.
        case "$SEVERITY_GATE" in
          CRITICAL) (( CRITICAL > 0 )) && { echo "::error::Severity gate CRITICAL: found $CRITICAL critical findings."; exit 1; } ;;
          HIGH)     (( CRITICAL + HIGH > 0 )) && { echo "::error::Severity gate HIGH: found $((CRITICAL + HIGH)) HIGH-or-above findings."; exit 1; } ;;
          MEDIUM)   (( CRITICAL + HIGH + MEDIUM > 0 )) && { echo "::error::Severity gate MEDIUM: found $((CRITICAL + HIGH + MEDIUM)) MEDIUM-or-above findings."; exit 1; } ;;
          LOW)      (( CRITICAL + HIGH + MEDIUM + LOW > 0 )) && { echo "::error::Severity gate LOW: found $((CRITICAL + HIGH + MEDIUM + LOW)) LOW-or-above findings."; exit 1; } ;;
          INFO)     (( CRITICAL + HIGH + MEDIUM + LOW + INFO > 0 )) && { echo "::error::Severity gate INFO: found $((CRITICAL + HIGH + MEDIUM + LOW + INFO)) total findings."; exit 1; } ;;
          none)     echo "✓ Severity gate disabled — findings reported but build will not fail." ;;
        esac

    - name: Upload SARIF to GitHub Code Scanning
      # `always()` so this step runs even when the severity gate above
      # exits non-zero. Without it, gated builds (the common case —
      # findings exist + gate fires) skip the upload entirely, and
      # Code Scanning never gets configured on the repo. The build
      # still ends red because the gate step already failed; the upload
      # just makes the findings visible in the Security tab regardless.
      if: ${{ always() && inputs.upload-sarif == 'true' && steps.fetch-sarif.outputs.path != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.fetch-sarif.outputs.path }}
        # Category groups uploads — using the scan ID lets re-uploads
        # for the same commit replace the prior result instead of
        # appending duplicates.
        category: breachlens-${{ steps.trigger.outputs.scan-id }}
